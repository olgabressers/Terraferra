name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub's legacy branch builder ("pages build and deployment")
# fails the deploy step on most pushes (fast ~10s rejection, build always OK).
# This workflow is the reliable fix. Requires:
# Repo → Settings → Pages → Source = "GitHub Actions"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
