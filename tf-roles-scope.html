<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>TF Roles &amp; Scope</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --tf:#4B40C2;
  --orange:#E86820;
  --off-white:#F7F6FB;
  --ink:#12102B;
  --sub:#5B5880;
  --rule:#D8D4EF;
}
body{font-family:'Inter',sans-serif;background:var(--off-white);color:var(--ink);min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:48px 60px 80px}
.back{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);text-decoration:none;display:inline-block;margin-bottom:32px;opacity:.7}
.back:hover{color:var(--tf);opacity:1}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--orange);margin-bottom:12px}
h1{font-size:36px;font-weight:800;letter-spacing:-1px;color:var(--ink);margin-bottom:48px;border-bottom:1.5px solid var(--tf);padding-bottom:18px}
.placeholder{background:white;border:1px dashed var(--rule);padding:48px;text-align:center;font-size:13px;color:var(--sub);font-style:italic}
@media(max-width:900px){.wrap{padding:32px 24px 56px}h1{font-size:28px}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/adminfiles/">← Terra Ferra</a>
  <div class="eyebrow">02</div>
  <h1>TF Roles &amp; Scope</h1>
  <div class="placeholder">Content to be added — co-founder responsibilities, decision rights, role boundaries.</div>
</div>
<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top" title="Back to top">&#8593;</button>
<style>#back-to-top{position:fixed;bottom:28px;right:28px;width:44px;height:44px;background:#4B40C2;color:white;border:1px solid rgba(113,105,212,.5);border-radius:50%;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:900;transition:background .2s;}#back-to-top:hover{background:#2D2595;}</style>
<script>window.addEventListener('scroll',function(){var b=document.getElementById('back-to-top');b.style.display=window.scrollY>400?'flex':'none';});</script>
</body>
</html>
