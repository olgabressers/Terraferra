<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Terra Ferra</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',sans-serif;
  background:#4B40C2;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 90% 100%, rgba(18,16,43,.65) 0%, transparent 55%),
             radial-gradient(ellipse at 10% 0%, rgba(113,105,212,.35) 0%, transparent 50%);
  pointer-events:none;
}
body::after{
  content:'TF';
  position:absolute;
  right:-40px;top:-60px;
  font-size:clamp(280px, 40vw, 500px);
  font-weight:800;
  color:rgba(232,104,32,.18);
  letter-spacing:-32px;
  line-height:1;
  pointer-events:none;
  user-select:none;
}
.inner{
  position:relative;
  z-index:1;
  text-align:center;
  max-width:700px;
}
.logo{
  font-size:clamp(56px, 10vw, 96px);
  font-weight:800;
  letter-spacing:-2px;
  line-height:1;
  text-transform:uppercase;
  margin-bottom:18px;
}
.tagline{
  font-size:11px;
  font-weight:600;
  letter-spacing:5px;
  text-transform:uppercase;
  color:rgba(255,255,255,.55);
  margin-bottom:44px;
}
.divider{
  width:64px;
  height:2px;
  background:#E86820;
  margin:0 auto 44px;
}
.coming{
  font-size:clamp(20px, 3vw, 28px);
  font-weight:300;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#E86820;
}
</style>
</head>
<body>
<div class="inner">
  <div class="logo">Terra Ferra</div>
  <div class="tagline">Community Powered Fashion</div>
  <div class="divider"></div>
  <div class="coming">Coming Soon</div>
</div>
</body>
</html>
