function hexToBytes(h){const b=new Uint8Array(h.length/2);for(let i=0;i<h.length;i+=2)b[i/2]=parseInt(h.substr(i,2),16);return b}
function b64ToBytes(s){const a=atob(s);const b=new Uint8Array(a.length);for(let i=0;i<a.length;i++)b[i]=a.charCodeAt(i);return b}
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock()});
async function unlock(){
  const pw=document.getElementById('pw').value;
  if(!pw)return;
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:hexToBytes(ENC.salt),iterations:100000,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
    const dec=await crypto.subtle.decrypt({name:'AES-CBC',iv:hexToBytes(ENC.iv)},key,b64ToBytes(ENC.ct));
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
