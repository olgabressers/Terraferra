<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Terra Ferra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --tf:#4B40C2;
  --tf-dark:#2D2595;
  --tf-deep:#12102B;
  --tf-mid:#7169D4;
  --tf-light:#ECEAF9;
  --tf-ghost:#F4F2FC;
  --orange:#E86820;
  --off-white:#F7F6FB;
  --ink:#12102B;
  --sub:#5B5880;
  --rule:#D8D4EF;
}
body{font-family:'Inter',sans-serif;background:var(--off-white);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}

header{padding:48px 60px 0}
.header-inner{max-width:1100px;margin:0 auto}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--sub);opacity:.6}
.logo{font-size:44px;font-weight:800;letter-spacing:-2px;text-transform:uppercase;color:var(--tf);margin-top:16px;line-height:1}
.tagline{font-size:10.5px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--sub);margin-top:12px;opacity:.55}

main{flex:1;padding:64px 60px 80px}
.grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}

.card{
  background:white;
  border:1px solid var(--rule);
  border-top:3px solid var(--tf);
  padding:32px 28px 28px;
  color:var(--ink);
  display:flex;
  flex-direction:column;
  min-height:200px;
}
.card-num{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--orange);margin-bottom:16px}
.card-title{font-size:18px;font-weight:800;line-height:1.3;color:var(--ink);margin-bottom:10px}
.card-sub{font-size:12.5px;color:var(--sub);line-height:1.55;margin-bottom:18px}
.card-links{margin-top:auto;display:flex;flex-direction:column;gap:6px;padding-top:14px;border-top:1px solid var(--rule)}
.card-link{font-size:12.5px;font-weight:600;color:var(--tf);text-decoration:none;line-height:1.4}
.card-link:hover{color:var(--orange);text-decoration:underline}

footer{padding:24px 60px;border-top:1px solid var(--rule);background:white}
.footer-inner{max-width:1100px;margin:0 auto;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);opacity:.5}

@media(max-width:900px){
  header{padding:32px 24px 0}
  main{padding:40px 24px 56px}
  footer{padding:20px 24px}
  .logo{font-size:36px}
  .grid{grid-template-columns:1fr;gap:14px}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="eyebrow">Internal · Private</div>
    <div class="logo">Terra Ferra</div>
    <div class="tagline">Workflow Hub</div>
  </div>
</header>

<main>
  <div class="grid">

    <div class="card">
      <div class="card-num">01</div>
      <div class="card-title">TF Budget &amp; Scenarios</div>
      <div class="card-links">
        <a class="card-link" href="/tf-budget-scenarios.html">Open →</a>
      </div>
    </div>

    <div class="card">
      <div class="card-num">02</div>
      <div class="card-title">TF Roles &amp; Scope</div>
      <div class="card-links">
        <a class="card-link" href="/tf-roles-scope.html">Open →</a>
      </div>
    </div>

    <div class="card">
      <div class="card-num">03</div>
      <div class="card-title">TF Ideas</div>
      <div class="card-links">
        <a class="card-link" href="/terra-ferra-ideas.html">Ideas &amp; AI Research →</a>
        <a class="card-link" href="/terra-ferra-influencer.html">Influencer Selling (Emerging Designers) →</a>
        <a class="card-link" href="/terra-ferra.html">CEO Strategic Brief →</a>
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="footer-inner">Private · noindex · Not for distribution</div>
</footer>

<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top" title="Back to top">&#8593;</button>
<style>#back-to-top{position:fixed;bottom:28px;right:28px;width:44px;height:44px;background:#4B40C2;color:white;border:1px solid rgba(113,105,212,.5);border-radius:50%;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:900;transition:background .2s;}#back-to-top:hover{background:#2D2595;}</style>
<script>window.addEventListener('scroll',function(){var b=document.getElementById('back-to-top');b.style.display=window.scrollY>400?'flex':'none';});</script>
</body>
</html>
